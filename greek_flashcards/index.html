<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b1020" />
  <title>Greek Flashcards</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="deck-name" id="deckName">Greek Flashcards</div>
    <div class="progress"><span id="cardIndex">0</span> / <span id="cardTotal">0</span></div>
  </header>

  <main class="card-stage">
    <section class="card" id="card" aria-live="polite">
      <div class="concept" id="concept">Loading…</div>
      <div class="example" id="example"></div>
      <button class="reveal-btn" id="revealBtn" type="button">Tap to reveal answer</button>
      <div class="answer hidden" id="answer"></div>
      <details class="notes" id="notesWrap" hidden>
        <summary>Notes</summary>
        <div id="notes"></div>
      </details>
      <div class="tags" id="tags"></div>
    </section>
  </main>

  <nav class="controls">
    <button id="prevBtn" type="button" aria-label="Previous">‹ Prev</button>
    <button id="shuffleBtn" type="button" aria-label="Shuffle">Shuffle</button>
    <select id="tagFilter" aria-label="Filter by tag">
      <option value="">All tags</option>
    </select>
    <button id="nextBtn" type="button" aria-label="Next">Next ›</button>
  </nav>

  <script src="app.js"></script>
</body>
</html>
